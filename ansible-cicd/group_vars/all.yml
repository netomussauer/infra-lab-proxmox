---
# ─────────────────────────────────────────────────────────
# Variáveis globais da stack CI/CD
# Consumidas por todos os playbooks via group_vars
# Valores substituíveis por hostvars populados pelo inventário
# gerado pelo generate_inventory.sh
# ─────────────────────────────────────────────────────────

# ── Versões dos serviços ──────────────────────────────────
gitea_version:         "1.21"
gitea_runner_version:  "0.2.6"
registry_version:      "2.8"

# ── Configuração do Gitea ─────────────────────────────────
# gitea_domain é sobrescrito pelo inventário gerado via Terraform
gitea_domain:    "{{ hostvars[inventory_hostname]['gitea_domain'] | default('gitea.lab.local') }}"
gitea_http_port: 3000
gitea_ssh_port:  2222

# ── Configuração do Registry ──────────────────────────────
registry_port: 5000

# ── Diretórios da stack ───────────────────────────────────
docker_compose_dir:  /opt/cicd
gitea_data_dir:      /opt/cicd/gitea-data
registry_data_dir:   /opt/cicd/registry-data

# ── Identificação do laboratório ─────────────────────────
lab_id:      "lab-k8s-proxmox-01"
environment: "dev"
managed_by:  "ansible"
project:     "hybrid-infra"
lab_owner:   "jose.mussauer"

# ── Parâmetros sysctl para Gitea e containers ─────────────
cicd_sysctl_params:
  vm.max_map_count: 262144
  fs.file-max: 65536
