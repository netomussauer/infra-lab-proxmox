---
# ─────────────────────────────────────────────────────────
# 02-install-docker.yml
# Instala Docker Engine e docker-compose-plugin via repositório
# oficial (mesmo padrão do playbook containerd do cluster k8s):
#   - Adiciona chave GPG e repositório Docker
#   - Instala docker-ce, docker-ce-cli, containerd.io, compose-plugin
#   - Adiciona o usuário vm_user ao grupo docker
#   - Habilita e inicia o serviço docker
# ─────────────────────────────────────────────────────────

- name: Instalar Docker Engine
  hosts: cicd_servers
  become: true
  gather_facts: true

  tasks:
    - name: Criar diretório para keyrings APT
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Baixar chave GPG do repositório Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Adicionar repositório Docker ao APT
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: true

    - name: Instalar Docker Engine e plugins
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: false

    - name: Adicionar usuário vm_user ao grupo docker
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Habilitar e iniciar serviço Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started
        daemon_reload: true

    - name: Verificar versão do Docker
      ansible.builtin.command: docker --version
      register: docker_version_output
      changed_when: false
      failed_when: docker_version_output.rc != 0

    - name: Verificar versão do docker compose
      ansible.builtin.command: docker compose version
      register: compose_version_output
      changed_when: false
      failed_when: compose_version_output.rc != 0

    - name: Exibir versões instaladas
      ansible.builtin.debug:
        msg:
          - "Docker: {{ docker_version_output.stdout }}"
          - "Compose: {{ compose_version_output.stdout }}"

  handlers:
    - name: Reiniciar Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
        daemon_reload: true
