---
# ─────────────────────────────────────────────────────────
# 03-deploy-stack.yml
# Faz o deploy da stack CI/CD via docker-compose:
#   - Renderiza templates: docker-compose.yml, app.ini, registry-config.yml
#   - Executa docker compose up -d
#   - Aguarda Gitea e Registry ficarem responsivos
# ─────────────────────────────────────────────────────────

- name: Deploy da stack CI/CD
  hosts: cicd_servers
  become: true
  gather_facts: true

  tasks:
    - name: Renderizar template docker-compose.yml
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ docker_compose_dir }}/docker-compose.yml"
        mode: "0644"
        owner: root
        group: root
      notify: Recriar stack

    - name: Renderizar configuração do Gitea (app.ini)
      ansible.builtin.template:
        src: ../templates/gitea-app.ini.j2
        dest: "{{ gitea_data_dir }}/conf/app.ini"
        mode: "0644"
        owner: "1000"
        group: "1000"
      notify: Recriar stack

    - name: Renderizar configuração do Registry
      ansible.builtin.template:
        src: ../templates/registry-config.yml.j2
        dest: "{{ docker_compose_dir }}/registry-config.yml"
        mode: "0644"
        owner: root
        group: root
      notify: Recriar stack

    - name: Garantir que a stack está rodando com docker compose up -d
      community.docker.docker_compose_v2:
        project_src: "{{ docker_compose_dir }}"
        state: present
        pull: missing

    - name: Aguardar Gitea responder na porta HTTP
      ansible.builtin.uri:
        url: "http://localhost:{{ gitea_http_port }}"
        method: GET
        status_code: [200, 302, 303]
        timeout: 10
      register: gitea_health
      until: gitea_health.status in [200, 302, 303]
      retries: 30
      delay: 10

    - name: Aguardar Registry responder no endpoint v2
      ansible.builtin.uri:
        url: "http://localhost:{{ registry_port }}/v2/"
        method: GET
        status_code: [200, 401]
        timeout: 10
      register: registry_health
      until: registry_health.status in [200, 401]
      retries: 15
      delay: 5

    - name: Exibir status dos serviços
      ansible.builtin.debug:
        msg:
          - "Gitea: http://{{ ansible_host }}:{{ gitea_http_port }} — status {{ gitea_health.status }}"
          - "Registry: http://{{ ansible_host }}:{{ registry_port }}/v2/ — status {{ registry_health.status }}"

  handlers:
    - name: Recriar stack
      community.docker.docker_compose_v2:
        project_src: "{{ docker_compose_dir }}"
        state: present
        recreate: always
